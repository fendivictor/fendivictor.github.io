<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - Mitra KDKMP</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root { --admin-dark: #212529; --primary-green: #198754; }
        body { 
            background: #f4f7f6;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        
        .login-card { width: 100%; max-width: 400px; padding: 20px; }
        .card { border: none; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); overflow: hidden; }
        .login-header { background: var(--admin-dark); color: white; padding: 35px 20px; text-align: center; }
        .login-header i { font-size: 2.5rem; color: var(--primary-green); }

        .form-label { font-size: 0.8rem; font-weight: 700; color: #444; margin-bottom: 6px; }
        .form-control { 
            border-radius: 12px; 
            padding: 12px 15px; 
            background: #f8f9fa; 
            border: 1px solid #dee2e6;
            font-size: 0.9rem;
        }
        .form-control:focus { 
            box-shadow: 0 0 0 4px rgba(25, 135, 84, 0.1); 
            border-color: var(--primary-green); 
            background: #fff;
        }

        /* Styling Error dengan DIV */
        .error-message {
            display: block;
            width: 100%;
            margin-top: 0.25rem;
            font-size: 0.75rem;
            color: #dc3545;
            font-weight: 600;
            animation: fadeIn 0.3s ease-in;
        }
        input.error { border-color: #dc3545 !important; background-color: #fff8f8; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        .btn-login { 
            background: var(--primary-green); 
            border: none; 
            border-radius: 12px; 
            padding: 14px; 
            font-weight: 700; 
            font-size: 0.95rem;
        }
        .btn-login:hover { background: #157347; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="card">
            <div class="login-header">
                <i class="bi bi-person-badge-fill"></i>
                <h5 class="fw-800 mt-2 mb-0">ADMIN LOGIN</h5>
                <p class="small mb-0 opacity-50">Koperasi Desa Mitra KDKMP</p>
            </div>
            
            <div class="card-body p-4">
                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" placeholder="Masukkan username admin">
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="••••••••">
                    </div>

                    <div id="alert-placeholder"></div>

                    <button type="submit" class="btn btn-success btn-login w-100 mb-3">
                        MASUK KE PANEL
                    </button>

                    <div class="text-center">
                        <a href="index.html" class="text-decoration-none text-muted small">
                            <i class="bi bi-house-door"></i> Kembali ke Katalog
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-validate/1.19.5/jquery.validate.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // 1. Inisialisasi Supabase 
        const supabaseUrl = 'https://fsbtlscplnmdyomtesal.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZzYnRsc2NwbG5tZHlvbXRlc2FsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0NzAyMzUsImV4cCI6MjA4OTA0NjIzNX0.XJVWGucUvuKotVN2l2glzMHU400K6nhdIkmWm-oGo6w';
        const sb = window.supabase.createClient(supabaseUrl, supabaseKey);

        $(document).ready(function() {
            sb.auth.onAuthStateChange((event, session) => {
                if (session) {
                    window.location.href = "admin-dashboard.html";
                }
            });

            $("#loginForm").validate({
                // Gunakan DIV sebagai elemen error
                errorElement: "div",
                errorClass: "error-message",
                
                rules: {
                    username: { required: true, minlength: 4 },
                    password: { required: true, minlength: 6 }
                },
                messages: {
                    username: "Username wajib diisi (min. 4 karakter)",
                    password: "Password wajib diisi (min. 6 karakter)"
                },
                
                // Menentukan posisi pesan error agar rapi (Display Block di bawah input)
                errorPlacement: function(error, element) {
                    error.insertAfter(element);
                },

                // Di dalam submitHandler loginForm
                submitHandler: async function(form, event) {
                    // Mencegah halaman refresh/ngeblink
                    event.preventDefault(); 
                    
                    const btn = $(".btn-login");
                    btn.prop('disabled', true).html('<span class="spinner-border spinner-border-sm"></span> Loading...');

                    const email = $("input[name='username']").val(); 
                    const password = $("input[name='password']").val();

                    try {
                        const { data, error } = await sb.auth.signInWithPassword({
                            email: email,
                            password: password,
                        });

                        if (error) {
                            throw error; // Lempar ke blok catch
                        }

                        if (data.session) {
                            $('#alert-placeholder').html('<div class="alert alert-success border-0 small py-2">Berhasil! Mengalihkan...</div>');
                            setTimeout(() => { window.location.href = "admin-dashboard.html"; }, 1000);
                        }
                    } catch (err) {
                        console.error("Detail Error:", err);
                        $('#alert-placeholder').html(`<div class="alert alert-danger border-0 small py-2">${err.message}</div>`);
                        btn.prop('disabled', false).text("MASUK KE PANEL");
                    }
                }
            });
        });
    </script>
</body>
</html>
