<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0a"/>
  
  <!-- Accent Line -->
  <rect x="0" y="0" width="8" height="630" fill="#3b82f6"/>
  
  <!-- Grid Pattern (subtle) -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1f1f1f" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Main Content Container -->
  <g transform="translate(80, 180)">
    
    <!-- Logo/Monogram -->
    <text x="0" y="80" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="72" font-weight="700" fill="#3b82f6">VF.</text>
    
    <!-- Name -->
    <text x="0" y="180" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="64" font-weight="700" fill="#ffffff">Victor Fendi</text>
    
    <!-- Title -->
    <text x="0" y="260" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="36" font-weight="400" fill="#a0a0a0">Software Engineer</text>
    
    <!-- Specialization Tags -->
    <g transform="translate(0, 320)">
      <!-- Tag 1 -->
      <rect x="0" y="0" width="140" height="44" rx="8" fill="rgba(59, 130, 246, 0.1)"/>
      <text x="20" y="28" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="500" fill="#3b82f6">Laravel</text>
      
      <!-- Tag 2 -->
      <rect x="160" y="0" width="100" height="44" rx="8" fill="rgba(59, 130, 246, 0.1)"/>
      <text x="180" y="28" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="500" fill="#3b82f6">PHP</text>
      
      <!-- Tag 3 -->
      <rect x="280" y="0" width="120" height="44" rx="8" fill="rgba(59, 130, 246, 0.1)"/>
      <text x="300" y="28" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="500" fill="#3b82f6">Docker</text>
      
      <!-- Tag 4 -->
      <rect x="420" y="0" width="160" height="44" rx="8" fill="rgba(59, 130, 246, 0.1)"/>
      <text x="440" y="28" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="500" fill="#3b82f6">Kubernetes</text>
    </g>
    
    <!-- Location -->
    <text x="0" y="420" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="400" fill="#606060">📍 Semarang, Indonesia</text>
    
  </g>
  
  <!-- Bottom Accent -->
  <rect x="0" y="622" width="1200" height="8" fill="#1f1f1f"/>
</svg>
